<div id="global-bookmarks-settings" class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>🌟 全局收藏夹 Pro 设置</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="settings_section flex-container align-items-center">
            <input type="checkbox" id="bkm-setting-show-fab">
            <label for="bkm-setting-show-fab">显示桌面悬浮球入口 (手机端随意拖拽不卡顿)</label>
        </div>
        <hr class="sysHR" />
        <div class="settings_section">
            <label for="bkm-setting-filter-tags">需要过滤的标签 (英文逗号分隔)：</label>
            <input type="text" id="bkm-setting-filter-tags" class="text_pole" placeholder="例如: think, thought">
        </div>
        <div class="settings_section flex-container align-items-center" style="margin-top: 10px;">
            <input type="checkbox" id="bkm-setting-remove-before">
            <label for="bkm-setting-remove-before" class="has-tooltip" data-tooltip="截断预防：直接把</think>之前的所有文字连带思维链一起抹除。">
                <span style="color: #ff6666; font-weight: bold;">暴力过滤：</span>删除 &lt;/标签&gt; 之前的所有内容
            </label>
        </div>
    </div>
</div>
